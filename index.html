<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>НКРЯ: Первое употребление</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;700&family=Literata:opsz,wght@7..72,500;7..72,700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="mark">НКРЯ · MAIN</p>
        <h1>Первое употребление слова</h1>
        <p class="subtitle">Введите одно слово, например, «самолет» или «картошка», и получите самую раннюю фиксацию в НКРЯ.</p>
      </header>

      <section class="panel">
        <form id="query-form" novalidate>
          <label for="word" class="label">Слово</label>
          <input
            id="word"
            name="word"
            type="text"
            maxlength="48"
            placeholder="например: любовь"
            autocomplete="off"
            required
          />
          <p class="field-hint">Пожалуйста, вводите только одно слово (без пробелов).</p>

          <div class="actions">
            <button id="submit-btn" type="submit">Показать первое употребление</button>
          </div>
          <p id="message" class="message" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section id="result-card" class="panel result hidden" aria-live="polite" aria-atomic="true" tabindex="-1">
        <p class="result-label">Первая фиксация в корпусе</p>
        <blockquote id="quote-text" class="quote"></blockquote>
        <p id="quote-meta" class="meta"></p>
        <p id="quote-source" class="source"></p>
        <div id="context-grid" class="context-grid hidden">
          <div id="ruler-card" class="context-card">
            <img id="ruler-image" alt="" loading="lazy" />
            <div class="context-text">
              <p id="ruler-title" class="context-title"></p>
              <p id="ruler-meta" class="context-meta"></p>
            </div>
          </div>
          <div id="art-card" class="context-card">
            <img id="art-image" alt="" loading="lazy" />
            <div class="context-text">
              <p id="art-title" class="context-title"></p>
              <p id="art-meta" class="context-meta"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
