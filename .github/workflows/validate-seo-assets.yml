name: Validate SEO Assets

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-generated-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: QA public content gate (block regressions)
        run: node reputation-case/site/tools/qa-public-content.mjs --output /tmp/qa-public-content-report.json

      - name: QA card language gate (no cross-language leakage)
        run: node reputation-case/site/tools/qa-card-language.mjs --output /tmp/qa-card-language-report.json

      - name: Source URL health audit
        run: node reputation-case/site/tools/check-source-urls.mjs

      - name: Build static digest assets
        env:
          BUILD_ENV: production
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
          GPTBOT_DISALLOW_PATHS: ${{ vars.GPTBOT_DISALLOW_PATHS }}
        run: node reputation-case/site/tools/build-indexable-assets.mjs

      - name: QA generated SEO assets (canonical/hreflang/index policy)
        env:
          BUILD_ENV: production
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
          GPTBOT_DISALLOW_PATHS: ${{ vars.GPTBOT_DISALLOW_PATHS }}
        run: node reputation-case/site/tools/qa-generated-assets.mjs

      - name: SEO audit report (canonical/hreflang/index policy)
        run: node reputation-case/site/tools/seo-audit.mjs > /dev/null

      - name: "CI gate: canonical + hreflang integrity"
        run: node reputation-case/site/tools/ci-canonical-hreflang-gate.mjs

      - name: SEO/AI endpoint gate (200/301 + crawler access + robots/sitemaps)
        env:
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
        run: node reputation-case/site/tools/check-public-endpoints.mjs --domain "https://www.klishin.work" --report

      - name: Ensure generated assets are committed
        run: |
          set -euo pipefail
          git diff -w --exit-code -- \
            reputation-case/site/index.html

          git diff --exit-code -- \
            reputation-case/site/posts \
            reputation-case/site/sitemap-en.xml \
            reputation-case/site/sitemap-fr.xml \
            reputation-case/site/sitemap-de.xml \
            reputation-case/site/sitemap-es.xml \
            reputation-case/site/rss.xml \
            reputation-case/site/robots.txt \
            reputation-case/site/data/search-index.json \
            reputation-case/site/data/search-index-en.json \
            reputation-case/site/data/search-index-fr.json \
            reputation-case/site/data/search-index-de.json \
            reputation-case/site/data/search-index-es.json
