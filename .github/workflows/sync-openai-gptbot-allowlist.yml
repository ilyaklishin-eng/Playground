name: Sync OpenAI GPTBot Allowlist

on:
  schedule:
    - cron: "52 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync OpenAI GPTBot IP ranges (and Cloudflare List if secrets are set)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_OPENAI_GPTBOT_LIST_ID: ${{ secrets.CF_OPENAI_GPTBOT_LIST_ID }}
          CF_OPENAI_GPTBOT_LIST_NAME: ${{ secrets.CF_OPENAI_GPTBOT_LIST_NAME }}
        run: node reputation-case/site/tools/sync-openai-gptbot-allowlist.mjs --write-files

      - name: Commit updated OpenAI GPTBot allowlist files
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            reputation-case/site/data/openai-gptbot-ip-allowlist.json \
            reputation-case/site/data/openai-gptbot-cidrs.txt; then
            echo "No OpenAI GPTBot allowlist changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            reputation-case/site/data/openai-gptbot-ip-allowlist.json \
            reputation-case/site/data/openai-gptbot-cidrs.txt
          git commit -m "chore: refresh OpenAI GPTBot IP allowlist"
          git push
