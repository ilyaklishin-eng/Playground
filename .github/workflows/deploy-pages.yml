name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_DOMAIN: "www.klishin.work"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: QA public content gate (block regressions)
        run: node reputation-case/site/tools/qa-public-content.mjs --output /tmp/qa-public-content-report.json

      - name: Build static digest assets
        env:
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
          GPTBOT_DISALLOW_PATHS: ${{ vars.GPTBOT_DISALLOW_PATHS }}
        run: node reputation-case/site/tools/build-indexable-assets.mjs

      - name: QA generated SEO assets
        env:
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
          GPTBOT_DISALLOW_PATHS: ${{ vars.GPTBOT_DISALLOW_PATHS }}
        run: node reputation-case/site/tools/qa-generated-assets.mjs

      - name: SEO/AI endpoint gate (200/301 + crawler access + robots/sitemaps)
        env:
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
        run: node reputation-case/site/tools/check-public-endpoints.mjs --domain "https://${{ env.PAGES_DOMAIN }}" --report

      - name: Ensure generated assets are committed
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            reputation-case/site/index.html \
            reputation-case/site/posts \
            reputation-case/site/sitemap.xml \
            reputation-case/site/sitemap-core.xml \
            reputation-case/site/sitemap-en.xml \
            reputation-case/site/sitemap-fr.xml \
            reputation-case/site/sitemap-de.xml \
            reputation-case/site/sitemap-es.xml \
            reputation-case/site/rss.xml \
            reputation-case/site/robots.txt \
            reputation-case/site/data/search-index.json

      - name: Copy source registry into published root
        run: cp reputation-case/source-registry-v1.tsv reputation-case/site/source-registry-v1.tsv

      - name: Ensure CNAME for custom domain
        run: printf '%s\n' '${{ env.PAGES_DOMAIN }}' > reputation-case/site/CNAME

      - name: Write IndexNow key file (optional)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY:-}" ]; then
            echo "INDEXNOW_KEY is empty; skipping key file."
            exit 0
          fi
          printf '%s\n' "$INDEXNOW_KEY" > "reputation-case/site/${INDEXNOW_KEY}.txt"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reputation-case/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-crawler-access:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify live access for important pages and crawler user-agents
        env:
          GPTBOT_POLICY: ${{ vars.GPTBOT_POLICY }}
        run: node reputation-case/site/tools/check-public-endpoints.mjs --domain "https://${{ env.PAGES_DOMAIN }}" --report

  notify-indexnow:
    needs: [deploy, verify-live-crawler-access]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${INDEXNOW_KEY:-}" ]; then
            echo "INDEXNOW_KEY is empty; skipping IndexNow submission."
            exit 0
          fi
          if printf '%s' '${{ env.PAGES_DOMAIN }}' | grep -E -q '<MY_DOMAIN>|\\.example$'; then
            echo 'PAGES_DOMAIN is placeholder domain; skipping IndexNow submission.'
            exit 0
          fi
          DOMAIN="https://${{ env.PAGES_DOMAIN }}"

          cat > urls.txt <<EOF
$DOMAIN/
$DOMAIN/sitemap.xml
$DOMAIN/sitemap-core.xml
$DOMAIN/sitemap-en.xml
$DOMAIN/sitemap-fr.xml
$DOMAIN/sitemap-de.xml
$DOMAIN/sitemap-es.xml
EOF

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE='${{ github.event.before }}'
            AFTER='${{ github.sha }}'
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git rev-list --max-parents=0 "$AFTER")"
            fi

            git diff --name-only "$BEFORE" "$AFTER" \
              | awk '/^reputation-case\/site\/.*\.(html|xml)$/ {print}' \
              | while read -r file; do
                  rel="${file#reputation-case/site/}"
                  if [ "$rel" = "index.html" ]; then
                    echo "$DOMAIN/"
                  elif [ "$rel" = "posts/index.html" ]; then
                    echo "$DOMAIN/posts/"
                  elif [ "$rel" = "about/index.html" ]; then
                    echo "$DOMAIN/about/"
                  elif [ "$rel" = "insights/index.html" ]; then
                    echo "$DOMAIN/insights/"
                  elif [ "$rel" = "archive/index.html" ]; then
                    echo "$DOMAIN/archive/"
                  else
                    echo "$DOMAIN/$rel"
                  fi
                done >> urls.txt
          fi

          sort -u urls.txt -o urls.txt

          if [ ! -s urls.txt ]; then
            printf '%s\n' "$DOMAIN/" > urls.txt
            printf '%s\n' "$DOMAIN/sitemap.xml" >> urls.txt
          fi

          jq -Rn --arg host '${{ env.PAGES_DOMAIN }}' --arg key "$INDEXNOW_KEY" \
            '{
              host: $host,
              key: $key,
              keyLocation: ("https://" + $host + "/" + $key + ".txt"),
              urlList: [inputs]
            }' urls.txt > indexnow.json

          curl -fsS 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @indexnow.json

  ping-sitemaps:
    needs: [deploy, verify-live-crawler-access]
    runs-on: ubuntu-latest
    steps:
      - name: Ping sitemap endpoints (Bing + Yandex)
        run: |
          set -euo pipefail
          if printf '%s' '${{ env.PAGES_DOMAIN }}' | grep -E -q '<MY_DOMAIN>|\\.example$'; then
            echo 'PAGES_DOMAIN is placeholder domain; skipping sitemap ping.'
            exit 0
          fi

          DOMAIN="https://${{ env.PAGES_DOMAIN }}"
          SITEMAPS=(
            "$DOMAIN/sitemap.xml"
            "$DOMAIN/sitemap-core.xml"
            "$DOMAIN/sitemap-en.xml"
            "$DOMAIN/sitemap-fr.xml"
            "$DOMAIN/sitemap-de.xml"
            "$DOMAIN/sitemap-es.xml"
          )
          ENDPOINTS=(
            "https://www.bing.com/ping"
            "https://yandex.com/ping"
            "https://yandex.ru/ping"
          )

          success_count=0
          for endpoint in "${ENDPOINTS[@]}"; do
            for sitemap in "${SITEMAPS[@]}"; do
              code="$(curl -sS -o /tmp/sitemap-ping-response.txt -w '%{http_code}' --get "$endpoint" --data-urlencode "sitemap=$sitemap" || true)"
              if [ -z "$code" ]; then
                code="000"
              fi
              echo "Ping $endpoint sitemap=$sitemap -> HTTP $code"
              if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
                success_count=$((success_count + 1))
              fi
            done
          done

          if [ "$success_count" -eq 0 ]; then
            echo "::warning::No sitemap ping returned 2xx/3xx. IndexNow submission still ran separately."
          else
            echo "Sitemap ping success responses: $success_count"
          fi
