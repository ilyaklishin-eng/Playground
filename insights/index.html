<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ilya Klishin | Fact-Based Digest</title>
    <meta
      name="description"
      content="Fact-based digest in English, French, and German with links to original sources."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link
      rel="canonical"
      href="https://ilyaklishin-eng.github.io/Playground/insights/index.html"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Ilya Klishin Digest RSS"
      href="./rss.xml"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ilia Klishin",
        "alternateName": ["Ilya Klishin", "Илья Клишин", "Ilia S. Klishin"],
        "url": "https://ilyaklishin-eng.github.io/Playground/insights/index.html",
        "sameAs": [
          "https://www.theguardian.com/world/2015/jun/08/30-under-30-moscows-young-power-list",
          "https://www.moscowtimes.ru/author/ilya-klishin"
        ]
      }
    </script>
  </head>
  <body>
    <div class="bg-ornament" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand">Ilya Klishin</div>
      <a class="source-link" href="./source-registry.tsv" target="_blank" rel="noreferrer">
        Source Registry
      </a>
    </header>

    <main class="page">
      <section class="hero">
        <p class="eyebrow">Fact-Based Digest</p>
        <h1>English, French, German</h1>
        <p class="lead">
          Verified digest entries with links to original publications. No reposts, no long quotes, only sourced summaries.
        </p>
        <p class="lead">
          Crawlable archive: <a href="./posts/index.html">all static digest pages</a>
        </p>
        <div class="stats" id="stats"></div>
      </section>

      <section class="controls" aria-label="Filters">
        <div class="lang-switch" id="langSwitch">
          <button class="lang-btn active" data-lang="ALL" type="button">All</button>
          <button class="lang-btn" data-lang="EN" type="button">EN</button>
          <button class="lang-btn" data-lang="FR" type="button">FR</button>
          <button class="lang-btn" data-lang="DE" type="button">DE</button>
        </div>
        <label class="search-wrap" for="searchInput">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Topic, source, keyword" />
        </label>
      </section>

      <section class="digest-grid" id="digestGrid" aria-live="polite"></section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-head">
          <span class="lang-tag"></span>
          <span class="status-tag"></span>
        </div>
        <h2 class="card-title"></h2>
        <p class="card-meta"></p>
        <p class="card-digest"></p>
        <blockquote class="card-quote"></blockquote>
        <a class="card-link" target="_blank" rel="noreferrer">Read original source</a>
      </article>
    </template>

    <footer class="footer">
      <p>
        Updated: <span id="updatedAt">-</span>
      </p>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
