      .primary-nav a[aria-current="page"] {
        border-color: var(--line-strong);
        color: var(--ink);
        background: var(--accent-soft);
      }

      .search-page {
        padding-bottom: 2rem;
      }

      .search-hero {
        margin-top: 1.35rem;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--paper);
        box-shadow: var(--shadow-card);
        padding: 1.3rem 1.45rem;
      }

      .search-hero h1 {
        margin: 0.35rem 0 0.45rem;
      }

      .search-hero p {
        margin: 0;
        color: var(--muted);
        max-width: 72ch;
      }

      .search-controls {
        margin-top: 0.95rem;
        display: grid;
        gap: 0.7rem;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--paper);
        box-shadow: var(--shadow-soft);
        padding: 0.95rem;
      }

      .search-query {
        display: grid;
        gap: 0.35rem;
      }

      .search-query label {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--muted);
      }

      .search-query input {
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 44px;
        padding: 0.62rem 0.72rem;
        font: inherit;
        background: #fff;
        color: var(--ink);
      }

      .search-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        align-items: center;
      }

      .lang-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--muted);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
        min-height: 44px;
        padding: 0.45rem 0.84rem;
        cursor: pointer;
      }

      .lang-chip.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent-ink);
      }

      .search-hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .search-summary {
        margin: 0.72rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .search-results {
        margin-top: 0.95rem;
        display: grid;
        gap: 0.82rem;
      }

      .result-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--paper);
        box-shadow: var(--shadow-soft);
        padding: 0.9rem 0.98rem;
      }

      .result-head {
        display: flex;
        gap: 0.45rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 0.42rem;
      }

      .result-badge {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--muted);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
        padding: 0.24rem 0.5rem;
      }

      .result-card h2 {
        margin: 0;
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.24rem;
        letter-spacing: -0.01em;
      }

      .result-card h2 a {
        color: var(--ink);
        text-decoration: none;
      }

      .result-card h2 a:hover {
        color: var(--accent-ink);
      }

      .result-meta {
        margin: 0.34rem 0 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .result-summary.result-context {
        margin: 0.46rem 0 0;
      }

      .result-context {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .result-links {
        margin: 0.55rem 0 0;
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .result-links a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        color: var(--accent-ink);
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 600;
        padding: 0.08rem 0.24rem;
      }

      .result-links a:hover {
        text-decoration: underline;
      }

      .search-empty {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0.85rem 0.95rem;
        background: var(--paper);
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .search-controls {
          padding: 0.82rem;
        }
      }

      @media (max-width: 520px) {
        .search-hero {
          padding: 1rem;
          border-radius: 18px;
        }

        .search-controls {
          padding: 0.75rem;
          border-radius: 16px;
        }

        .result-card {
          padding: 0.84rem;
          border-radius: 14px;
        }

        .result-card h2 {
          font-size: 1.12rem;
        }
      }
